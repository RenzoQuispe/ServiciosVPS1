events {}

http {
    # Evita rutas relativas raras si algo ejecuta nginx desde otro directorio
    error_log C:/nginx-1.29.8/logs/error.log;

    map_hash_bucket_size 64;
    map $http_x_internal_token $vps_api_ok {
        default 0;
        "token_vps_gestoria_3146660015" 1;
    }

    # --- HTTP: challenge Letâ€™s Encrypt + todo lo demÃ¡s a HTTPS ---
    server {
        listen 80 default_server;
        server_name vpsservicios.gestorianegocios.com 167.86.109.161 _;

        location ^~ /.well-known/acme-challenge/ {
            default_type "text/plain";
            root C:/nginx-1.29.8/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: mismo proxy que antes ---
    server {
        listen 443 ssl;
        server_name vpsservicios.gestorianegocios.com;

        # AJUSTA estos dos nombres a los archivos reales en C:\nginx-1.29.8\certs
        ssl_certificate     C:/nginx-1.29.8/certs/vpsservicios.gestorianegocios.com-chain.pem;
        ssl_certificate_key C:/nginx-1.29.8/certs/vpsservicios.gestorianegocios.com-key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        location = /codigobarras/health {
            proxy_pass http://127.0.0.1:3001/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /canvas/health {
            proxy_pass http://127.0.0.1:3002/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /codigobarras/ {
            if ($vps_api_ok = 0) { return 403; }
            proxy_pass http://127.0.0.1:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /canvas/ {
            if ($vps_api_ok = 0) { return 403; }
            proxy_pass http://127.0.0.1:3002/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /enrich/health {
                proxy_pass http://127.0.0.1:3003/health;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /enrich/ {
                if ($vps_api_ok = 0) { return 403; }
                proxy_pass http://127.0.0.1:3003/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 120s;
        }

    }
}