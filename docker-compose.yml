services:
  codigobarras:
    build:
      context: ./CodigoBarras-a-Producto
      dockerfile: Dockerfile
    image: codigobarras-a-producto:latest
    container_name: codigobarras
    env_file: ./CodigoBarras-a-Producto/.env
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

  canvas-a-productos:
    build:
      context: ./Canvas-a-Productos
      dockerfile: Dockerfile
    image: canvas-a-productos:latest
    container_name: canvas-a-productos
    env_file: ./Canvas-a-Productos/.env
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - canvas_output:/app/output
    restart: unless-stopped

  extraer-info-anuncios:
    build:
      context: ./Extraer-Info-para-Anuncios
      dockerfile: Dockerfile
    image: extraer-info-anuncios:latest
    container_name: extraer-info-anuncios
    env_file: ./Extraer-Info-para-Anuncios/.env
    ports:
      - "127.0.0.1:3003:3000"
    restart: unless-stopped

volumes:
  canvas_output:
